name: Pipeline de Actualización de Juegos

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código del repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependencias del Backend
        working-directory: ./back
        run: npm install

      - name: 🌐 Instalar librerías de sistema para Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget unzip fontconfig locales gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils

      - name: 🕷️ Ejecutar Scraper (gameScrap.js)
        working-directory: ./back
        run: node services/gameScrap.js

      - name: 💾 Subir a Base de Datos (uploadGames.js)
        working-directory: ./back
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }} # Variable de entorno segura
        run: node services/uploadGames.js