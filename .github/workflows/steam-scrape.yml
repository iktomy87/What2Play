name: Steam Games Scraper

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json

      - name: Instalar dependencias
        working-directory: ./back
        run: npm install

      - name: Instalar dependencias de Puppeteer (Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget unzip fontconfig locales gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils

      - name: Ejecutar Scraper
        working-directory: ./back
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }} 
        run: node services/gameScrap.js

      - name: Subir resultados a la base de datos
        working-directory: ./back
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node services/uploadGames.js

      - name: Guardar log de cambios (Opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: back/steam_games_requisitos.json

      - name: Notificar a Discord
        if: always() 
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "🤖 Automatización What2Play"
          description: |
            El proceso de actualización de base de datos ha finalizado.
            **Estado:** ${{ job.status == 'success' && '✅ Éxito' || '❌ Fallido' }}
            **Script:** `gameScrap.js` -> `uploadGames.js`
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
          username: "What2Play Bot"