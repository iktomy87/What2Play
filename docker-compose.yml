version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8081"
    volumes:
      - ./back:/usr/src/app/back
      - /usr/src/app/back/node_modules
    container_name: recojuegos-backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    volumes:
      - ./front/what2play:/usr/src/app/front
      - /usr/src/app/front/node_modules
    depends_on:
      - backend
    container_name: recojuegos-frontend

networks:
  default:
    driver: bridge
